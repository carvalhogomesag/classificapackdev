<!--
  triagem.html
  Faz: Contém a estrutura visual integral da Seção de Triagem, incluindo o banner inteligente do PWA, o visor principal, o leitor de voz e o teclado numérico gigante.
  NÃO faz: Não inclui scripts diretos, folhas de estilo ou cabeçalhos globais do documento.
  Depende de: Injeção assíncrona pelo main.js no index.html.
-->

<main id="view-triagem" class="flex-1 flex flex-col p-4 space-y-4">
    
    <!-- Banner Inteligente de Instalação Manual/Automática PWA -->
    <div id="banner-pwa-instalacao" class="hidden bg-blue-50 p-3 rounded-xl border border-blue-200 flex items-center justify-between shadow-sm animate-fade-in">
        <div class="flex items-center space-x-2.5">
            <i class="fa-solid fa-mobile-screen-button text-blue-600 text-lg"></i>
            <div>
                <h4 class="text-xs font-bold text-blue-900">Classifica Pack no Telemóvel</h4>
                <p class="text-[10px] text-blue-600 leading-tight">Instale para usar offline e com mais rapidez.</p>
            </div>
        </div>
        <button type="button" id="btn-instalar-pwa" class="bg-blue-600 active:bg-blue-700 text-white font-bold text-xs px-3 py-1.5 rounded-lg shadow-sm whitespace-nowrap">
            Instalar
        </button>
    </div>

    <!-- Fixador de Prefixo -->
    <div class="bg-blue-50 p-3 rounded-lg border border-blue-200">
        <div class="flex items-center justify-between">
            <label class="flex items-center space-x-2 text-sm font-semibold text-blue-800 cursor-pointer">
                <input type="checkbox" id="chk-fixar-prefixo" class="w-4 h-4 text-blue-600 rounded">
                <span>Fixar 4 dígitos iniciais</span>
            </label>
            <input type="number" id="input-prefixo" placeholder="Ex: 2700" disabled
                   class="w-20 px-2 py-1 text-center border rounded bg-gray-200 text-gray-500 font-bold focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
    </div>

    <!-- Visor de Visualização do Código Postal -->
    <div class="bg-gray-900 text-white rounded-xl p-4 text-center shadow-inner relative">
        <div class="text-xs text-gray-400 uppercase tracking-wider">Código Postal</div>
        <div id="visor-codigo" class="text-4xl font-mono font-bold tracking-widest mt-1 text-yellow-400">
            - - - - - - -
        </div>
    </div>

    <!-- Procurar Código por Morada (Com reconhecimento de voz) -->
    <div class="bg-blue-50 p-3 rounded-lg border border-blue-200 space-y-2">
        <label class="block text-xs font-bold uppercase text-blue-800">
            <i class="fa-solid fa-microphone mr-1"></i> Procurar Código por Voz:
        </label>
        <div class="flex space-x-2">
            <input type="text" id="busca-morada-triagem" placeholder="Fale ou digite a morada..." 
                   class="flex-1 p-2.5 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500 bg-white">
            <button type="button" id="btn-voz-triagem" class="bg-blue-50 active:bg-blue-200 text-blue-700 border border-blue-200 rounded-lg px-4 flex items-center justify-center shadow-sm transition animate-none" title="Ditar morada">
                <i class="fa-solid fa-microphone text-lg" id="mic-inativo-triagem"></i>
                <i class="fa-solid fa-microphone text-lg animate-pulse text-red-500 hidden" id="mic-ativo-triagem"></i>
            </button>
        </div>
        <!-- Input de captura da câmara mantido oculto para reativação nativa (Tesseract) -->
        <input type="file" id="input-camera-captura" accept="image/*" capture="environment" class="hidden">
    </div>

    <!-- Teclado Numérico Gigante para Operação Rápida -->
    <div class="grid grid-cols-3 gap-3 flex-1">
        <button type="button" class="btn-key bg-gray-200 active:bg-gray-300 text-2xl font-bold py-4 rounded-xl shadow-sm focus:outline-none" data-val="1">1</button>
        <button type="button" class="btn-key bg-gray-200 active:bg-gray-300 text-2xl font-bold py-4 rounded-xl shadow-sm focus:outline-none" data-val="2">2</button>
        <button type="button" class="btn-key bg-gray-200 active:bg-gray-300 text-2xl font-bold py-4 rounded-xl shadow-sm focus:outline-none" data-val="3">3</button>
        
        <button type="button" class="btn-key bg-gray-200 active:bg-gray-300 text-2xl font-bold py-4 rounded-xl shadow-sm focus:outline-none" data-val="4">4</button>
        <button type="button" class="btn-key bg-gray-200 active:bg-gray-300 text-2xl font-bold py-4 rounded-xl shadow-sm focus:outline-none" data-val="5">5</button>
        <button type="button" class="btn-key bg-gray-200 active:bg-gray-300 text-2xl font-bold py-4 rounded-xl shadow-sm focus:outline-none" data-val="6">6</button>
        
        <button type="button" class="btn-key bg-gray-200 active:bg-gray-300 text-2xl font-bold py-4 rounded-xl shadow-sm focus:outline-none" data-val="7">7</button>
        <button type="button" class="btn-key bg-gray-200 active:bg-gray-300 text-2xl font-bold py-4 rounded-xl shadow-sm focus:outline-none" data-val="8">8</button>
        <button type="button" class="btn-key bg-gray-200 active:bg-gray-300 text-2xl font-bold py-4 rounded-xl shadow-sm focus:outline-none" data-val="9">9</button>
        
        <button type="button" id="btn-key-clear" class="bg-red-100 active:bg-red-200 text-red-700 text-lg font-bold py-4 rounded-xl shadow-sm focus:outline-none">Limpar</button>
        <button type="button" class="btn-key bg-gray-200 active:bg-gray-300 text-2xl font-bold py-4 rounded-xl shadow-sm focus:outline-none" data-val="0">0</button>
        <button type="button" id="btn-key-backspace" class="bg-yellow-100 active:bg-yellow-200 text-yellow-700 text-xl font-bold py-4 rounded-xl shadow-sm focus:outline-none">
            <i class="fa-solid fa-backspace"></i>
        </button>
    </div>

    <!-- Botão de Ação de Triagem -->
    <button id="btn-analisar" class="w-full bg-green-600 active:bg-green-700 text-white font-bold text-xl py-4 rounded-xl shadow-md transition duration-150">
        Analisar Código
    </button>
</main>
