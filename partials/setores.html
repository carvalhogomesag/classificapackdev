<!--
  setores.html
  Faz: Contém a estrutura visual integral do ecrã de Gestão de Setores de Entrega, incluindo o formulário de atribuição de freguesias/localidades de Mafra e a lista de setores ativos.
  NÃO faz: Não inclui scripts diretos, folhas de estilo ou cabeçalhos globais do documento.
  Depende de: Injeção assíncrona pelo main.js no index.html.
-->

<main id="view-intervalos" class="hidden flex-1 p-4 space-y-4 overflow-y-auto">
    
    <!-- Formulário de Criação e Edição de Setores Geográficos -->
    <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm space-y-3">
        <h2 class="text-xl font-bold text-gray-800">Criar Setor de Entrega</h2>
        <form id="form-setor" class="space-y-3">
            <div>
                <label class="block text-xs font-bold uppercase text-gray-600">Nome do Setor</label>
                <input type="text" id="setor-nome" required placeholder="Ex: Setor Norte, Setor Oeste"
                       class="w-full mt-1 p-2 border rounded outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <div class="flex justify-between items-center mb-1">
                    <label class="block text-xs font-bold uppercase text-gray-600">Selecionar Áreas (Localidades)</label>
                    <span class="text-[9px] text-gray-400 font-semibold italic">*Área única por setor</span>
                </div>
                <!-- Árvore geográfica de 3 níveis preenchida dinamicamente pelo setores.js -->
                <div id="checkboxes-areas" class="border rounded p-2 max-h-56 overflow-y-auto space-y-2 bg-gray-50">
                    <p class="text-xs text-gray-400 italic text-center py-2">A carregar áreas do sistema...</p>
                </div>
            </div>
            <div class="flex space-x-2">
                <button type="button" id="btn-cancelar-setor" class="hidden flex-1 bg-gray-100 text-gray-700 font-bold py-2.5 rounded-lg shadow">
                    Cancelar
                </button>
                <button type="submit" id="btn-submit-setor" class="flex-1 bg-blue-600 text-white font-bold py-2.5 rounded-lg shadow hover:bg-blue-700 transition">
                    Criar Setor
                </button>
            </div>
        </form>
    </div>

    <!-- Lista de Setores Ativos e seus respetivos territórios -->
    <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm space-y-3">
        <h3 class="text-sm font-bold uppercase text-gray-500 mb-1">Setores Ativos</h3>
        <div id="lista-setores" class="space-y-2 max-h-64 overflow-y-auto pr-1">
            <p class="text-sm text-gray-400 italic text-center py-4">Nenhum sector registado.</p>
        </div>
    </div>

</main>
