<!--
  motoristas.html
  Faz: Contém a estrutura visual integral do ecrã de Gestão de Motoristas, incluindo o sumário de leituras, formulário de registo e lista de motoristas ativos.
  NÃO faz: Não inclui scripts diretos, folhas de estilo ou cabeçalhos globais do documento.
  Depende de: Injeção assíncrona pelo main.js no index.html.
-->

<main id="view-motoristas" class="hidden flex-1 p-4 space-y-4 overflow-y-auto">
    
    <!-- Painel de Estatísticas de Leituras Gerais do Turno -->
    <div class="bg-gray-50 p-4 rounded-xl border border-gray-200 shadow-sm">
        <div class="flex justify-between items-center mb-3">
            <h3 class="text-sm font-bold uppercase text-gray-500 tracking-wider">Resumo de Leituras</h3>
            <button id="btn-limpar-leituras" class="text-xs text-red-600 active:text-red-800 font-bold flex items-center space-x-1 border border-red-200 px-2 py-1 rounded bg-red-50">
                <i class="fa-solid fa-rotate-left"></i> <span>Reset Leituras</span>
            </button>
        </div>
        <div id="painel-resumo" class="space-y-2"></div>
    </div>

    <h2 class="text-xl font-bold text-gray-800 mt-2">Registo de Motoristas</h2>
    
    <!-- Formulário de Criação e Edição de Motorista -->
    <form id="form-motorista" class="bg-white p-4 rounded-lg border border-gray-200 space-y-3">
        <div>
            <label class="block text-xs font-bold uppercase text-gray-600">Nome do Motorista</label>
            <input type="text" id="nome-motorista" required placeholder="Ex: João Silva" 
                   class="w-full mt-1 p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <div>
            <div class="flex justify-between items-center mb-1">
                <label class="block text-xs font-bold uppercase text-gray-600">Associar Setor(es)</label>
                <span class="text-[9px] text-gray-400 font-semibold italic">*Um setor só pode ter 1 motorista</span>
            </div>
            <!-- Lista dinâmica de checkboxes de setores preenchida pelo motoristas.js -->
            <div id="checkboxes-setores-motorista" class="border rounded p-2 max-h-56 overflow-y-auto space-y-2 bg-gray-50">
                <p class="text-xs text-gray-400 italic text-center py-2">A carregar setores do sistema...</p>
            </div>
        </div>
        <div>
            <label class="block text-xs font-bold uppercase text-gray-600 mb-1">Cor de Identificação</label>
            <!-- Palete dinâmica de cores criada no main.js -->
            <div class="grid grid-cols-6 gap-2" id="color-picker-container"></div>
        </div>
        <div class="flex space-x-2">
            <button type="button" id="btn-cancelar-motorista" class="hidden flex-1 bg-gray-100 text-gray-700 font-bold py-2 rounded shadow">
                Cancelar
            </button>
            <button type="submit" id="btn-submit-motorista" class="flex-1 bg-blue-600 text-white font-bold py-2 rounded shadow">
                Adicionar Motorista
            </button>
        </div>
    </form>

    <!-- Lista de Motoristas Registados em Memória -->
    <div>
        <h3 class="text-sm font-bold uppercase text-gray-500 mb-2">Motoristas Ativos</h3>
        <div id="lista-motoristas" class="space-y-2">
            <p class="text-sm text-gray-400 italic text-center py-4">Nenhum motorista registado.</p>
        </div>
    </div>
</main>
