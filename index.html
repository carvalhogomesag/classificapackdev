<!DOCTYPE html>
<html lang="pt">
<head>
    <!--
      index.html
      Faz: Atua como a casca (App Shell) principal do PWA. Contém o cabeçalho, barra de navegação inferior, modais globais e os contentores onde os ecrãs parciais são injetados dinamicamente.
      NÃO faz: Não contém ecrãs de triagem, setores ou rotas rígidos em código estático (são injetados assincronamente pelo main.js).
      Depende de: config.js, js/main.js, CDN Tailwind, CDN FontAwesome, CDN Tesseract.js e o Service Worker (sw.js).
    -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Classifica Pack</title>
    
    <!-- Configurações PWA -->
    <link class="manifest" rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563EB">
    <link class="apple-touch-icon" href="icon-192.png">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Ícones simples -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tesseract.js para processamento OCR local na câmara do telemóvel -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <!-- CORREÇÕES VISUAIS PARA O AUTOCOMPLETE DO GOOGLE MAPS -->
    <style>
        /* Garante que o menu de sugestões do Google fique sempre acima de qualquer elemento da app */
        .pac-container {
            z-index: 9999 !important;
            border-radius: 12px !important;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05) !important;
            border: 1px solid #E5E7EB !important;
            font-family: inherit !important;
            margin-top: 4px !important;
        }
        .pac-item {
            padding: 12px 14px !important;
            cursor: pointer !important;
            font-size: 13px !important;
            color: #374151 !important;
            display: flex !important;
            align-items: center !important;
        }
        .pac-item:hover {
            background-color: #F3F4F6 !important;
        }
        .pac-icon {
            margin-right: 8px !important;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-900 select-none relative">

    <!-- Container Principal (Shell) -->
    <div class="max-w-md mx-auto min-h-screen flex flex-col bg-white shadow-lg relative pb-20">
        
        <!-- Cabeçalho de Identidade -->
        <header class="bg-blue-600 text-white p-4 text-center font-bold text-lg shadow-md z-10">
            Classifica Pack
        </header>

        <!-- CONTENTORES DAS VISTAS PARCIAIS (Injetadas assincronamente pelo main.js) -->
        <div id="container-view-triagem"></div>
        <div id="container-view-motoristas"></div>
        <div id="container-view-intervalos"></div>
        <div id="container-view-rotas"></div>

        <!-- OVERLAY DO RESULTADO DA TRIAGEM (Global/Partilhado) -->
        <div id="modal-resultado" class="hidden absolute inset-0 bg-black/60 flex items-center justify-center p-4 z-50">
            <div class="bg-white w-full rounded-2xl overflow-hidden shadow-2xl flex flex-col max-h-[95vh]">
                <div class="flex-shrink-0 bg-gray-100 p-3 border-b text-center font-bold text-gray-700">Resultado da Triagem</div>
                <div id="resultado-cor-bg" class="flex-1 flex flex-col items-center justify-center p-5 text-center space-y-2 overflow-y-auto transition-colors duration-300">
                    <p class="text-white text-sm font-semibold tracking-wider uppercase opacity-85">Código Postal</p>
                    <h3 id="resultado-codigo" class="text-white text-3xl font-mono font-black tracking-widest bg-black/25 px-4 py-1.5 rounded-lg">---</h3>
                    <p class="text-white text-sm font-semibold tracking-wider uppercase opacity-85 mt-2">Motorista Designado</p>
                    <h2 id="resultado-motorista" class="text-white text-2xl font-bold tracking-wide drop-shadow-md">---</h2>
                </div>
                <div class="flex-shrink-0 p-3 bg-gray-50 border-t border-b flex items-center justify-center">
                    <label class="flex items-center space-x-3 text-base font-bold text-gray-700 cursor-pointer">
                        <input type="checkbox" id="chk-prioridade" class="w-6 h-6 text-orange-600 rounded focus:ring-orange-500 border-gray-300">
                        <span class="flex items-center space-x-2">
                            <i class="fa-solid fa-circle-exclamation text-orange-500 text-lg"></i>
                            <span>Encomenda Prioritária</span>
                        </span>
                    </label>
                </div>
                <div class="flex-shrink-0 p-3 bg-gray-50 flex space-x-3">
                    <button id="btn-cancelar-atribuir" class="flex-1 bg-gray-200 active:bg-gray-300 text-gray-700 font-bold text-base py-3.5 rounded-xl shadow-md">
                        <i class="fa-solid fa-xmark mr-1"></i> Cancelar
                    </button>
                    <button id="btn-confirmar-atribuir" class="flex-1 bg-blue-600 active:bg-blue-700 text-white font-bold text-base py-3.5 rounded-xl shadow-md">
                        <i class="fa-solid fa-check mr-1"></i> Confirmar
                    </button>
                </div>
            </div>
        </div>

        <!-- MODAL DE EDIÇÃO DA PARAGEM (Global/Partilhado) -->
        <div id="modal-editar-paragem" class="hidden absolute inset-0 bg-black/60 flex items-center justify-center p-6 z-50">
            <div class="bg-white w-full rounded-2xl overflow-hidden shadow-2xl p-4 space-y-4">
                <h3 class="font-bold text-gray-700 text-lg flex items-center space-x-2">
                    <i class="fa-solid fa-pen-to-square text-blue-600"></i>
                    <span>Editar Informações</span>
                </h3>
                <div class="space-y-3">
                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-500">Morada de Entrega</label>
                        <input type="text" id="edit-morada-texto" class="w-full mt-1 p-3 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-500">Observações / Notas</label>
                        <textarea id="edit-morada-obs" placeholder="Ex: Deixar com o vizinho no nº 12, código do portão..." class="w-full mt-1 p-3 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500 h-24 resize-none"></textarea>
                    </div>
                </div>
                <div class="flex space-x-2">
                    <button id="btn-cancelar-edicao" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-3 rounded-xl text-sm">
                        Cancelar
                    </button>
                    <button id="btn-salvar-edicao" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl text-sm">
                        Guardar Alterações
                    </button>
                </div>
            </div>
        </div>

        <!-- BARRA DE NAVEGAÇÃO INFERIOR FIXA (Global) -->
        <nav class="fixed bottom-0 inset-x-0 max-w-md mx-auto bg-white border-t border-gray-200 h-16 flex items-center justify-around z-20 shadow-lg">
            <button id="nav-triagem" class="flex flex-col items-center justify-center w-full h-full text-blue-600 font-bold text-xs space-y-1">
                <i class="fa-solid fa-qrcode text-lg"></i>
                <span>Triagem</span>
            </button>
            <button id="nav-motoristas" class="flex flex-col items-center justify-center w-full h-full text-gray-400 font-semibold text-xs space-y-1">
                <i class="fa-solid fa-users text-lg"></i>
                <span>Motoristas</span>
            </button>
            <button id="nav-intervalos" class="flex flex-col items-center justify-center w-full h-full text-gray-400 font-semibold text-xs space-y-1">
                <i class="fa-solid fa-map-location-dot text-lg"></i>
                <span>Setores</span>
            </button>
            <button id="nav-rotas" class="flex flex-col items-center justify-center w-full h-full text-gray-400 font-semibold text-xs space-y-1">
                <i class="fa-solid fa-route text-lg"></i>
                <span>Rotas</span>
            </button>
        </nav>

    </div>

    <!-- Scripts de Configuração e Arranque -->
    <script src="config.js"></script>
    <script type="module" src="js/main.js"></script>

    <!-- Registo do Service Worker para suporte PWA offline -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registado com sucesso para uso offline. Escopo:', reg.scope))
                    .catch(err => console.error('Falha ao registar o Service Worker:', err));
            });
        }
    </script>
</body>
</html>
