<!DOCTYPE html>
<html lang="pt">
<head>
    <!--
      index.html
      Faz: Atua como a casca (App Shell) principal do PWA. Contém o cabeçalho com selo de versão v25, barra de navegação inferior, modais globais e os contentores onde os ecrãs parciais são injetados dinamicamente.
      NÃO faz: Não contém ecrãs de triagem, setores ou rotas rígidos em código estático (são injetados assincronamente pelo main.js).
      Depende de: config.js, js/main.js, CDN Tailwind, CDN FontAwesome, CDN Tesseract.js e o Service Worker (sw.js).
    -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Classifica Pack</title>
    
    <!-- Configurações PWA -->
    <link class="manifest" rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563EB">
    <link class="apple-touch-icon" href="icon-192.png">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Ícones simples -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tesseract.js para processamento OCR local na câmara do telemóvel -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <!-- CORREÇÕES VISUAIS PARA O AUTOCOMPLETE DO GOOGLE MAPS -->
    <style>
        /* Garante que o menu de sugestões do Google fique sempre acima de qualquer elemento da app */
        .pac-container {
            z-index: 9999 !important;
            border-radius: 12px !important;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05) !important;
            border: 1px solid #E5E7EB !important;
            font-family: inherit !important;
            margin-top: 4px !important;
        }
        .pac-item {
            padding: 12px 14px !important;
            cursor: pointer !important;
            font-size: 13px !important;
            color: #374151 !important;
            display: flex !important;
            align-items: center !important;
        }
        .pac-item:hover {
            background-color: #F3F4F6 !important;
        }
        .pac-icon {
            margin-right: 8px !important;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-900 select-none relative overflow-hidden">

    <!-- Container Principal (Shell) 
         MELHORADO V25: Altura travada no ecrã (h-screen) e scroll geral desativado (overflow-hidden)
         para criar uma experiência de aplicação nativa onde só o conteúdo do meio é que rola. -->
    <div class="max-w-md mx-auto h-screen flex flex-col bg-white shadow-lg relative overflow-hidden">
        
        <!-- Cabeçalho de Identidade (Selo visual de versão v25 no canto direito) -->
        <header class="bg-blue-600 text-white p-4 text-center font-bold text-lg shadow-md z-10 relative flex-shrink-0">
            <span>Classifica Pack</span>
            <span class="absolute right-4 top-5 bg-blue-500/50 text-blue-100 text-[10px] font-mono px-2 py-0.5 rounded-full border border-blue-400/30">v25</span>
        </header>

        <!-- CONTENTORES DAS VISTAS PARCIAIS (Injetadas assincronamente pelo main.js) -->
        <div id="container-view-triagem" class="flex-1 flex flex-col overflow-hidden"></div>
        <div id="container-view-motoristas" class="flex-1 flex flex-col overflow-hidden"></div>
        <div id="container-view-intervalos" class="flex-1 flex flex-col overflow-hidden"></div>
        <div id="container-view-rotas" class="flex-1 flex flex-col overflow-hidden"></div>

        <!-- OVERLAY DO RESULTADO DA TRIAGEM (Global/Partilhado) -->
        <div id="modal-resultado" class="hidden absolute inset-0 bg-black/60 flex items-center justify-center p-4 z-50">
            <div class="bg-white w-full rounded-2xl overflow-hidden shadow-2xl flex flex-col max-h-[95vh]">
                <div class="flex-shrink-0 bg-gray-100 p-3 border-b text-center font-bold text-gray-700">Resultado da Triagem</div>
                <div id="resultado-cor-bg" class="flex-1 flex flex-col items-center justify-center p-5 text-center space-y-2 overflow-y-auto transition-colors duration-300">
                    <p class="text-white text-sm font-semibold tracking-wider uppercase opacity-85">Código Postal</p>
                    <h3 id="resultado-codigo" class="text-white text-3xl font-mono font-black tracking-widest bg-black/25 px-4 py-1.5 rounded-lg">---</h3>
                    <p class="text-white text-sm font-semibold tracking-wider uppercase opacity-85 mt-2">Motorista Designado</p>
                    <h2 id="resultado-motorista" class="text-white text-2xl font-bold tracking-wide drop-shadow-md">---</h2>
                </div>
                <div class="flex-shrink-0 p-3 bg-gray-50 border-t border-b flex items-center justify-center">
                    <label class="flex items-center space-x-3 text-base font-bold text-gray-700 cursor-pointer">
                        <input type="checkbox" id="chk-prioridade" class="w-6 h-6 text-orange-600 rounded focus:ring-orange-500 border-gray-300">
                        <span class="flex items-center space-x-2">
                            <i class="fa-solid fa-circle-exclamation text-orange-500 text-lg"></i>
                            <span>Encomenda Prioritária</span>
                        </span>
                    </label>
                </div>
                <div class="flex-shrink-0 p-3 bg-gray-50 flex space-x-3">
                    <button id="btn-cancelar-atribuir" class="flex-1 bg-gray-200 active:bg-gray-300 text-gray-700 font-bold text-base py-3.5 rounded-xl shadow-md">
                        <i class="fa-solid fa-xmark mr-1"></i> Cancelar
                    </button>
                    <button id="btn-confirmar-atribuir" class="flex-1 bg-blue-600 active:bg-blue-700 text-white font-bold text-base py-3.5 rounded-xl shadow-md">
                        <i class="fa-solid fa-check mr-1"></i> Confirmar
                    </button>
                </div>
            </div>
        </div>

        <!-- MODAL DE EDIÇÃO DA PARAGEM (Global/Partilhado) -->
        <div id="modal-editar-paragem" class="hidden absolute inset-0 bg-black/60 flex items-center justify-center p-4 z-50">
            <div class="bg-white w-full rounded-2xl overflow-hidden shadow-2xl flex flex-col max-h-[90vh] transition-all">
                
                <!-- Título do Modal -->
                <div class="flex-shrink-0 bg-gray-50 p-4 border-b flex items-center space-x-2">
                    <i class="fa-solid fa-circle-info text-blue-600 text-lg"></i>
                    <h3 class="font-bold text-gray-850 text-base">Editar Detalhes da Entrega</h3>
                </div>

                <!-- Conteúdo com Scroll Interno para Teclados de Telemóveis -->
                <div class="flex-1 p-4 overflow-y-auto space-y-4">
                    
                    <!-- Campo de Morada -->
                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-500 tracking-wider">Morada de Entrega</label>
                        <input type="text" id="edit-morada-texto" class="w-full mt-1.5 p-3 border border-gray-200 rounded-xl text-sm font-semibold outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50/50">
                    </div>

                    <!-- Secção 1: Tipo de Embalagem (Grelha Tátil) -->
                    <div class="space-y-1.5">
                        <label class="block text-xs font-bold uppercase text-gray-500 tracking-wider">Tipo de Embalagem</label>
                        <div class="grid grid-cols-2 gap-2">
                            <button type="button" class="btn-tipo-embalagem px-3 py-2.5 bg-gray-50 text-gray-700 font-bold text-xs rounded-xl border border-gray-200 active:bg-blue-50 transition-all text-center" data-tipo="Envelope">
                                <i class="fa-regular fa-envelope mr-1 text-gray-400"></i> Envelope
                            </button>
                            <button type="button" class="btn-tipo-embalagem px-3 py-2.5 bg-gray-50 text-gray-700 font-bold text-xs rounded-xl border border-gray-200 active:bg-blue-50 transition-all text-center" data-tipo="Caixa Pequena">
                                <i class="fa-solid fa-box-open mr-1 text-gray-400"></i> Caixa Pequena
                            </button>
                            <button type="button" class="btn-tipo-embalagem px-3 py-2.5 bg-gray-50 text-gray-700 font-bold text-xs rounded-xl border border-gray-200 active:bg-blue-50 transition-all text-center" data-tipo="Caixa Grande">
                                <i class="fa-solid fa-box mr-1 text-gray-400"></i> Caixa Grande
                            </button>
                            <button type="button" class="btn-tipo-embalagem px-3 py-2.5 bg-gray-50 text-gray-700 font-bold text-xs rounded-xl border border-gray-200 active:bg-blue-50 transition-all text-center" data-tipo="Pacote">
                                <i class="fa-solid fa-boxes-stacked mr-1 text-gray-400"></i> Pacote
                            </button>
                        </div>
                    </div>

                    <!-- Secção 2: Clientes Frequentes / Parceiros (Grelha Tátil) -->
                    <div class="space-y-1.5">
                        <label class="block text-xs font-bold uppercase text-gray-500 tracking-wider">Origem / Cliente Frequente</label>
                        <div class="grid grid-cols-2 gap-2">
                            <button type="button" class="btn-origem-pacote px-3 py-2.5 bg-gray-50 text-gray-700 font-bold text-xs rounded-xl border border-gray-200 active:bg-blue-50 transition-all text-center" data-origem="Amazon">
                                Amazon
                            </button>
                            <button type="button" class="btn-origem-pacote px-3 py-2.5 bg-gray-50 text-gray-700 font-bold text-xs rounded-xl border border-gray-200 active:bg-blue-50 transition-all text-center" data-origem="Zara">
                                Zara
                            </button>
                            <button type="button" class="btn-origem-pacote px-3 py-2.5 bg-gray-50 text-gray-700 font-bold text-xs rounded-xl border border-gray-200 active:bg-blue-50 transition-all text-center" data-origem="China (Temu/Shein)">
                                China (Temu/Shein)
                            </button>
                            <button type="button" class="btn-origem-pacote px-3 py-2.5 bg-blue-50 text-blue-700 font-extrabold text-xs rounded-xl border border-blue-200 active:bg-blue-100 transition-all text-center flex items-center justify-center space-x-1" data-origem="Fraldas">
                                <i class="fa-solid fa-heart text-red-500"></i> <span>Fraldas</span>
                            </button>
                        </div>
                    </div>

                    <!-- Secção 3: Observações / Notas Dinâmicas -->
                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-500 tracking-wider">Observações / Notas Finais</label>
                        <textarea id="edit-morada-obs" placeholder="Ex: Deixar na garagem, código do portão..." class="w-full mt-1.5 p-3 border border-gray-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500 h-20 resize-none font-semibold"></textarea>
                    </div>

                    <!-- Secção 4: Prioridade -->
                    <div class="bg-orange-50/50 border border-orange-100 rounded-xl p-3">
                        <label class="flex items-center space-x-3 text-sm font-bold text-gray-700 cursor-pointer">
                            <input type="checkbox" id="edit-morada-prioridade" class="w-5 h-5 text-orange-600 rounded focus:ring-orange-500 border-gray-300">
                            <span class="flex items-center space-x-1.5">
                                <i class="fa-solid fa-circle-exclamation text-orange-500 text-lg"></i>
                                <span>Encomenda Prioritária</span>
                            </span>
                        </label>
                    </div>

                </div>

                <!-- Botões de Ação do Modal -->
                <div class="flex-shrink-0 p-3 bg-gray-50 border-t flex space-x-3">
                    <button id="btn-cancelar-edicao" class="flex-1 bg-gray-200 active:bg-gray-300 text-gray-700 font-bold py-3.5 rounded-xl text-sm shadow-sm">
                        Cancelar
                    </button>
                    <button id="btn-salvar-edicao" class="flex-1 bg-blue-600 active:bg-blue-700 text-white font-bold py-3.5 rounded-xl text-sm shadow-sm">
                        Guardar Alterações
                    </button>
                </div>

            </div>
        </div>

        <!-- BARRA DE NAVEGAÇÃO INFERIOR FIXA (Global) -->
        <nav class="fixed bottom-0 inset-x-0 max-w-md mx-auto bg-white border-t border-gray-200 h-16 flex items-center justify-around z-20 shadow-lg">
            <button id="nav-triagem" class="flex flex-col items-center justify-center w-full h-full text-blue-600 font-bold text-xs space-y-1">
                <i class="fa-solid fa-qrcode text-lg"></i>
                <span>Triagem</span>
            </button>
            <button id="nav-motoristas" class="flex flex-col items-center justify-center w-full h-full text-gray-400 font-semibold text-xs space-y-1">
                <i class="fa-solid fa-users text-lg"></i>
                <span>Motoristas</span>
            </button>
            <button id="nav-intervalos" class="flex flex-col items-center justify-center w-full h-full text-gray-400 font-semibold text-xs space-y-1">
                <i class="fa-solid fa-map-location-dot text-lg"></i>
                <span>Setores</span>
            </button>
            <button id="nav-rotas" class="flex flex-col items-center justify-center w-full h-full text-gray-400 font-semibold text-xs space-y-1">
                <i class="fa-solid fa-route text-lg"></i>
                <span>Rotas</span>
            </button>
        </nav>

    </div>

    <!-- Scripts de Configuração e Arranque -->
    <script src="config.js"></script>
    <script type="module" src="js/main.js"></script>

    <!-- Registo do Service Worker para suporte PWA offline -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registado com sucesso para uso offline. Escopo:', reg.scope))
                    .catch(err => console.error('Falha ao registar o Service Worker:', err));
            });
        }
    </script>
</body>
</html>
